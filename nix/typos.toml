[default.extend-identifiers]
# Technical identifiers that are not typos.
alo = "alo"   # common package name

[files]
extend-exclude = [
  "*.lock",
  "*.pem",
  "flake.lock",
  "CHANGELOG.md",

  # Flutter/Xcode auto-generated platform files
  "*.pbxproj",
  "*.xib",
  "*.storyboard",
  "*.xcscheme",
  "*.xcworkspacedata",
  "*.plist",

  # Flutter localization (contains non-English text)
  "*.arb",

  # Dart/Flutter generated code
  "*.g.dart",
  "*.freezed.dart",
  "*.mocks.dart",

  # Platform runner directories (auto-generated by Flutter)
  "**/ios/Runner/**",
  "**/macos/Runner/**",
  "**/android/**",
  "**/windows/runner/**",
  "**/linux/flutter/**",
]
