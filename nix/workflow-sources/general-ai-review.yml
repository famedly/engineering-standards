name: AI Code Review

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model to use for the review"
        type: string
        default: "claude-sonnet-4-5"
    secrets:
      ANTHROPIC_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@@checkout@
      - uses: anthropics/claude-code-action@@claudeCodeAction@
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: ${{ inputs.model }}
