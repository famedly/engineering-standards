# Manages floating major tags (v1, v2, …) and GitHub Releases for
# engineering-standards reusable workflows.
#
# When a semver tag (e.g. v1.3.0) is pushed, this workflow:
#   1. Extracts the major version (v1)
#   2. Force-updates the floating major tag to point at this commit
#   3. Creates a GitHub Release with auto-generated notes
#
# This lets consumer repos reference @v1 in their caller workflows
# and automatically receive non-breaking patches.

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@@checkout@

      - name: Update floating major tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          MAJOR="${TAG%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" -m "Release $TAG"
          git push origin "$MAJOR" --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
