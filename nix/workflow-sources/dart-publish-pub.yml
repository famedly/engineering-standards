name: "Publish to pub.dev"

on:
  workflow_call:
    inputs:
      env_file:
        description: "Path to an .env file to read dart_version from."
        type: string
        required: false

jobs:
  publish:
    environment: "pub.dev"
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@@checkout@

      - name: Read env file
        if: inputs.env_file != ''
        run: cat ${{ inputs.env_file }} >> $GITHUB_ENV

      - uses: dart-lang/setup-dart@@setupDart@
        with:
          sdk: ${{ env.dart_version || 'stable' }}

      - run: dart pub get
      - run: dart pub publish --dry-run
      - run: dart pub publish -f
