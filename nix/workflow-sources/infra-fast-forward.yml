name: Fast-forward merge

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  fast-forward:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/fast-forward')
    runs-on: ubuntu-latest
    steps:
      - uses: sequoia-pgp/fast-forward@@fastForward@
        with:
          merge: true
