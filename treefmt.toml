allowMissingFormatter = false
excludes = [
    "*.lock",
    "*.patch",
    "package-lock.json",
    "go.mod",
    "go.sum",
    ".gitattributes",
    ".gitignore",
    ".gitmodules",
    ".hgignore",
    ".svnignore",
    "LICENSE",
    ".pre-commit-config.yaml",
    ".github/workflows/check-pre-commit-hooks.yml",
    ".gitattributes",
    "treefmt.toml",
]
walk = "git"

[formatter.nixfmt]
command = "nixfmt"
excludes = []
includes = ["*.nix"]
options = ["--strict"]

[formatter.rustfmt]
command = "rustfmt"
excludes = []
includes = ["*.rs"]
options = ["--config", "skip_children=true", "--edition", "2024"]

[formatter.shfmt]
command = "shfmt"
excludes = []
includes = ["*.sh", "*.bash", "*.envrc", "*.envrc.*"]
options = ["-w", "-i", "0", "-s"]
