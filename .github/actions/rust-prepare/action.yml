name: "Prepare rust environment"
description: "Sets up Cargo home and optional private crate registry (HTTPS + token) for Rust builds"
inputs:
  cargo_home:
    description: "Cargo home"
    default: ".cargo"
  crate_registry_name:
    description: "Famedly registry name"
    default: "famedly"
  crate_registry_index_url:
    description: "URL of famedly registry index"
    default: "https://git.shipyard.rs/famedly/crate-index.git"
  shipyard_rs_token:
    description: "Shipyard.rs API token for authenticating with the private crate registry. When set, configures HTTPS git credentials and cargo registry token."
  additional_packages:
    description: "Additional package to install during preparation"
    default: ""

runs:
  using: "composite"
  steps:
    - shell: bash
      env:
        CARGO_HOME: ${{ inputs.cargo_home }}
        ADDITIONAL_PACKAGES: ${{ inputs.additional_packages }}
        CRATE_REGISTRY_NAME: ${{ inputs.crate_registry_name }}
        CRATE_REGISTRY_INDEX_URL: ${{ inputs.crate_registry_index_url }}
        SHIPYARD_RS_TOKEN: ${{ inputs.shipyard_rs_token }}
      run: $GITHUB_ACTION_PATH/prepare.sh
