---
name: Black formatting
on:
  workflow_call:
    inputs:
      collection:
        type: string
        required: true

permissions:
  contents: read

jobs:
  black:
    strategy:
      matrix:
        python_version:
          - "3.11"
        ansible_version:
          - "8.3.0"
    name: "Run Black"
    runs-on: ubuntu-latest
    container: registry.famedly.net/docker-oss/ansible:py-${{ matrix.python_version }}-ansible-${{ matrix.ansible_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          path: "ansible_collections/${{ inputs.collection }}"

      - name: Run Black
        uses: famedly/black@6fdf8a4af28071ed1d079c01122b34c5d587207a # stable
        with:
          options: "--check --verbose"
