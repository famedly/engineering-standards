# managed-by: engineering-standards — do not edit manually
# Regenerate with: nix run .#regenerateStandards
name: CI
on:
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["**"]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  nix-checks:
    name: "Nix checks"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31.10.2
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: famedly
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY_FAMEDLY }}"
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN_FAMEDLY }}"
        continue-on-error: true
      - name: Run all checks
        run: nix flake check -L
