# This file is automatically generated from Nix configuration. Do not edit directly.

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  nix-checks:
    name: Nix checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff
        with:
          extra_nix_config: experimental-features = nix-command flakes
      - continue-on-error: true
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN_FAMEDLY }}
          name: famedly
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY_FAMEDLY }}
      - name: Run all checks
        run: nix flake check -L
name: CI
"on":
  merge_group: {}
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main
    tags:
      - '*'
