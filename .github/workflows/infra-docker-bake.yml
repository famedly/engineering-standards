name: "Docker — Bake Build & Push"

on:
  workflow_call:
    inputs:
      files:
        description: "Bake definition file(s), newline-separated"
        type: string
        default: "docker-bake.hcl"
      targets:
        description: "Bake target(s) to build"
        type: string
        default: "default"
      push:
        description: "Whether to push the built images"
        type: boolean
        required: true
      registry:
        description: "Container registry to push to"
        type: string
        default: ghcr.io
      registry_user:
        description: "Username for the container registry"
        type: string
        default: ${{ github.repository_owner }}
      image_name:
        description: "Base image name (used for metadata tags)"
        type: string
        default: ${{ github.repository }}
    secrets:
      registry_password:
        description: "Password for the container registry. Falls back to GITHUB_TOKEN."
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log into registry ${{ inputs.registry }}
        if: inputs.push
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ inputs.registry_user }}
          password: ${{ secrets.registry_password || secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name }}

      - name: Build and push via Bake
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        with:
          files: |
            ${{ inputs.files }}
            ${{ steps.meta.outputs.bake-file }}
          targets: ${{ inputs.targets }}
          push: ${{ inputs.push }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
