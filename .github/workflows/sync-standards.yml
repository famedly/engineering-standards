name: Sync engineering standards

# Drop this workflow into any repository to keep its local AI rules
# and dependabot.yml in sync with the central engineering-standards repo.
# Language scope (dart/rust/python) is detected automatically.

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  repository_dispatch:
    types: [engineering-standards-updated]
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6

      - name: Fetch engineering standards
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/engineering-standards
          path: _standards
          sparse-checkout: |
            .github/rules
            scripts
          token: ${{ secrets.ENGINEERING_STANDARDS_READ }}

      - name: Detect language scope
        id: scope
        run: |
          SCOPE=""
          if [ -f "pubspec.yaml" ]; then SCOPE="dart"; fi
          if [ -f "Cargo.toml" ]; then SCOPE="${SCOPE:+$SCOPE }rust"; fi
          for f in requirements.txt pyproject.toml setup.py Pipfile; do
            if [ -f "$f" ]; then SCOPE="${SCOPE:+$SCOPE }python"; break; fi
          done
          for f in Dockerfile docker-compose.yml docker-compose.yaml; do
            if [ -f "$f" ]; then SCOPE="${SCOPE:+$SCOPE }docker"; break; fi
          done
          if find . -name '*.tf' -maxdepth 3 2>/dev/null | grep -q .; then
            SCOPE="${SCOPE:+$SCOPE }terraform"
          fi
          if find . -name 'Chart.yaml' -maxdepth 3 2>/dev/null | grep -q .; then
            SCOPE="${SCOPE:+$SCOPE }helm"
          fi
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Detected scope: '${SCOPE:-none}'"

      - name: Generate rule files
        run: |
          SCOPE="${{ steps.scope.outputs.scope }}"

          # -- .cursor/rules/ (Cursor IDE) --
          rm -rf .cursor/rules/standards
          mkdir -p .cursor/rules/standards
          cp _standards/.github/rules/*.md .cursor/rules/standards/
          for lang in $SCOPE; do
            if [ -d "_standards/.github/rules/$lang" ]; then
              cp _standards/.github/rules/$lang/*.md .cursor/rules/standards/
            fi
          done

          # -- CLAUDE.md (Claude Code CLI) --
          cat _standards/.github/rules/*.md > CLAUDE.md
          for lang in $SCOPE; do
            if [ -d "_standards/.github/rules/$lang" ]; then
              cat _standards/.github/rules/$lang/*.md >> CLAUDE.md
            fi
          done

      - name: Sync dependabot.yml
        run: |
          SCOPE="${{ steps.scope.outputs.scope }}"
          MANAGED_MARKER="This file is auto-generated by engineering-standards"
          if [ -f .github/dependabot.yml ] && ! grep -q "$MANAGED_MARKER" .github/dependabot.yml; then
            echo "::warning::Skipping dependabot.yml sync – file exists without managed marker. Add the marker comment or remove the file to enable sync."
          else
            bash _standards/scripts/generate-dependabot.sh "$SCOPE" > .github/dependabot.yml
          fi

      - name: Cleanup
        run: rm -rf _standards

      - name: Create PR if changed
        uses: peter-evans/create-pull-request@v8
        with:
          title: "chore: sync engineering standards"
          body: |
            Automated sync from the [engineering-standards](https://github.com/${{ github.repository_owner }}/engineering-standards) repository.

            Updates `.cursor/rules/standards/`, `CLAUDE.md`, and `.github/dependabot.yml` to the latest version.
          branch: chore/sync-engineering-standards
          commit-message: "chore: sync engineering standards"
          delete-branch: true
