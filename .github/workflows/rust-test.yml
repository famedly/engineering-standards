# This file is automatically generated from Nix configuration. Do not edit directly.

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
defaults:
  run:
    shell: nu --no-config-file --no-history {0}
env:
  CARGO_TERM_COLOR: always
jobs:
  test:
    runs-on: ubuntu-latest-4core
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
      - uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff
name: Rust test workflow
"on":
  pull_request:
    branches:
      - '*'
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main
    tags:
      - '*'
