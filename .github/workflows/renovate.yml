name: Renovate

on:
  schedule:
    - cron: '0 4 * * 1-5'
  workflow_dispatch: {}

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Git Credentials for Private Repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.RENOVATE_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${{ secrets.RENOVATE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_AUTODISCOVER: "true"
          RENOVATE_AUTODISCOVER_FILTER: "famedly/*"
          RENOVATE_ALLOWED_POST_UPGRADE_COMMANDS: '["^flutter pub get$"]'
          RENOVATE_BINARY_SOURCE: "global"
          LOG_LEVEL: debug
        run: npx renovate
