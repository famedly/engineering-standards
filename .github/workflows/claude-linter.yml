name: "Claude Linter"

on:
  workflow_call:
    inputs:
      rule_scope:
        description: "Language-specific rule directories to include (e.g. 'dart', 'rust', 'dart rust')"
        required: false
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  review-code:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout engineering-standards
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/engineering-standards
          path: engineering-standards

      - name: Checkout PR repository
        uses: actions/checkout@v6
        with:
          path: pr-repo
          fetch-depth: 1

      - name: Combine Rulesets
        run: |
          cat engineering-standards/.github/rules/*.md > combined-rules.txt

          SCOPE="${{ inputs.rule_scope }}"
          for lang in $SCOPE; do
            if [ -d "engineering-standards/.github/rules/$lang" ]; then
              cat engineering-standards/.github/rules/$lang/*.md >> combined-rules.txt
              echo "Included $lang rules."
            else
              echo "Warning: No rules found for scope '$lang'"
            fi
          done

          echo "Rules successfully combined."

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review the Git diff of this Pull Request. Enforce the ruleset below. Follow the persona, output format, and few-shot examples exactly as defined in the rules. No deviations.

            Use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true` to post inline comments on specific lines.
            Use `gh pr comment` to post the final STATUS summary.

            $(cat combined-rules.txt)
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
