name: "Claude Standards Review"

# Drop this workflow into any repository to enable on-demand code reviews.
# Write "@check-standards" in a PR comment to trigger a review.
# Language scope (dart/rust) is detected automatically.

on:
  issue_comment:
    types: [created]

jobs:
  review-code:
    if: >
      github.event.issue.pull_request
      && contains(github.event.comment.body, '@check-standards')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Acknowledge request
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Checkout engineering-standards
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/engineering-standards
          path: engineering-standards
          token: ${{ secrets.ENGINEERING_STANDARDS_READ }}

      - name: Checkout PR repository
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          path: pr-repo
          fetch-depth: 1

      - name: Detect language scope
        id: scope
        working-directory: pr-repo
        run: |
          SCOPE=""
          if [ -f "pubspec.yaml" ]; then SCOPE="dart"; fi
          if [ -f "Cargo.toml" ]; then SCOPE="${SCOPE:+$SCOPE }rust"; fi
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "Detected scope: '${SCOPE:-none}'"

      - name: Combine Rulesets
        run: |
          cat engineering-standards/.github/rules/*.md > combined-rules.txt

          SCOPE="${{ steps.scope.outputs.scope }}"
          for lang in $SCOPE; do
            if [ -d "engineering-standards/.github/rules/$lang" ]; then
              cat engineering-standards/.github/rules/$lang/*.md >> combined-rules.txt
              echo "Included $lang rules."
            else
              echo "Warning: No rules found for scope '$lang'"
            fi
          done

          echo "Rules successfully combined."

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            Review the Git diff of this Pull Request. Enforce the ruleset below. Follow the persona, output format, and few-shot examples exactly as defined in the rules. No deviations.

            Use `mcp__github_inline_comment__create_inline_comment` with `confirmed: true` to post inline comments on specific lines.

            --- SUMMARY COMMENT RULES ---

            Instead of creating a new comment every run, you MUST update an existing
            summary comment if one exists. Follow these steps exactly:

            1. Search for an existing summary comment containing the HTML marker
               `<!-- claude-standards-review -->`:

               gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
                 --jq '.[] | select(.body | contains("<!-- claude-standards-review -->")) | .id' \
                 | head -1

            2a. IF a comment ID is found:
                - Fetch its body:
                  gh api "repos/${{ github.repository }}/issues/comments/<ID>" --jq '.body'
                - Extract every row from the existing History table (if any).
                - Extract the CURRENT status line (the "## Standards Review: …" heading)
                  and the current date from the existing comment.
                - Build the updated comment (see format below), prepending the old
                  status as a new row at the TOP of the History table.
                - Update the comment:
                  gh api "repos/${{ github.repository }}/issues/comments/<ID>" \
                    -X PATCH -f body="<updated body>"

            2b. IF no comment ID is found:
                - Create a new comment with `gh pr comment`.

            3. The comment MUST use this exact format (replace placeholders):

               <!-- claude-standards-review -->
               ## Standards Review: <STATUS_EMOJI> <STATUS>

               <Your review summary — keep it concise.>

               _Reviewed at <YYYY-MM-DD HH:MM> UTC_

               <details>
               <summary>📜 Previous runs</summary>

               | # | Status | Date |
               |---|--------|------|
               | <N> | <OLD_EMOJI> <OLD_STATUS> | <OLD_DATE> |
               | … older rows … |

               </details>

               STATUS_EMOJI mapping: ✅ for PASS, ❌ for FAIL, ⚠️ for WARN.
               Number runs sequentially (oldest = 1).
               If there is no history yet, still include the <details> block with
               an empty table body.

            --- END SUMMARY COMMENT RULES ---

            $(cat combined-rules.txt)
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"
