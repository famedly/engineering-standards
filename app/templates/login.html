<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Engineering Standards</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@unocss/reset@66.6.6/tailwind.min.css"
          integrity="sha384-5No3aIPh9Fyxot7m9jZbgh0VGr2Es7rfpXHslqfLnS2+VcBdD1883jFW03WMy2gc"
          crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@unocss/runtime@66.6.6/uno.global.js"
            integrity="sha384-FAcExN5wNTEAAIXTgfC/M0t7lbEg7j3RK73C0Evrqi1CwZkfu1YjuGGjTyZjdtS5"
            crossorigin="anonymous"></script>
    <style>[un-cloak] { display: none; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center" un-cloak>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-8 w-full max-w-sm text-center">
        <h1 class="text-xl font-semibold text-gray-900 mb-2">Engineering Standards</h1>
        <p class="text-sm text-gray-500 mb-6">Sign in to view org compliance and manage standards.</p>
        <a href="/login"
           class="inline-block w-full bg-gray-900 text-white rounded-md px-4 py-2 text-sm font-medium hover:bg-gray-800 transition-colors">
            Sign in with SSO
        </a>
    </div>
</body>
</html>
